<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز الصيانة PRO</title>

<style>
body{font-family:Segoe UI;background:#f4f7f9;margin:0;padding:15px}
.container{max-width:800px;margin:auto}

.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}

input,select,textarea,button{
width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc
}

.row{display:flex;gap:8px}
.row>*{flex:1}

.btn{background:#2980b9;color:#fff;border:none}
.btn-green{background:#27ae60;color:#fff;border:none}
.btn-red{background:#e74c3c;color:#fff;border:none}

.item{
background:#fff;padding:12px;border-radius:10px;margin:10px 0;
border-right:6px solid #ccc
}

.waiting{border-color:#f39c12}
.fixing{border-color:#3498db}
.done{border-color:#2ecc71}

video{width:100%;border-radius:10px}
#scanner{display:none}
.small{font-size:12px;color:#666}
</style>
</head>

<body>

<div class="container">

<h2>📱 مركز وسام PRO</h2>

<div class="card">

<input id="serial" placeholder="الباركود">

<button class="btn" onclick="startCam()">📷 كاميرا</button>

<input id="name" placeholder="اسم الزبون">
<input id="phone" placeholder="الهاتف">
<input id="device" placeholder="نوع الجهاز">

<textarea id="fault" placeholder="العطل"></textarea>

<input type="date" id="date">

<div class="row">
<input id="cost" type="number" placeholder="تكلفة" oninput="calc()">
<input id="charge" type="number" placeholder="أجر" oninput="calc()">
</div>

<div class="row">
<input id="paid" type="number" placeholder="مدفوع" oninput="calc()">
<select id="delivered">
<option value="no">لم يُسلّم</option>
<option value="yes">تم التسليم</option>
</select>
</div>

<select id="status">
<option value="waiting">انتظار</option>
<option value="fixing">صيانة</option>
<option value="done">جاهز</option>
</select>

<div id="calcBox">💰</div>

<button class="btn-green" onclick="save()">حفظ</button>

</div>

<div class="card">
<input id="search" placeholder="بحث..." oninput="render()">
<button onclick="autoFill()">تعبئة تلقائية</button>
</div>

<div id="list"></div>

<!-- Camera -->
<div class="card" id="scanner">
<video id="video" autoplay></video>
<button class="btn-red" onclick="stopCam()">إغلاق</button>
</div>

</div>

<script>

let db;
let stream;

/* DB */
indexedDB.open("repairDB",1).onupgradeneeded=e=>{
let db=e.target.result;
db.createObjectStore("orders",{keyPath:"id",autoIncrement:true});
};

function getDB(cb){
let req=indexedDB.open("repairDB",1);
req.onsuccess=e=>cb(e.target.result);
}

/* calc */
function calc(){
let c=+cost.value||0;
let ch=+charge.value||0;
let p=+paid.value||0;
calcBox.innerText="💰 التكلفة: "+(c+ch)+" | الربح: "+(p-(c+ch));
}

/* save */
function save(){
getDB(db=>{
let tx=db.transaction("orders","readwrite");
let st=tx.objectStore("orders");

st.add({
serial:serial.value,
name:name.value,
phone:phone.value,
device:device.value,
fault:fault.value,
date:date.value,
cost:+cost.value||0,
charge:+charge.value||0,
paid:+paid.value||0,
status:status.value,
delivered:delivered.value
});

tx.oncomplete=render;
});
}

/* render */
function render(){
getDB(db=>{
let tx=db.transaction("orders","readonly");
let st=tx.objectStore("orders");
let req=st.getAll();

req.onsuccess=()=>{
let data=req.result;

let s=search.value.toLowerCase();

if(s){
data=data.filter(x=>
(x.serial||"").includes(s)||
(x.name||"").includes(s)||
(x.phone||"").includes(s)
);
}

list.innerHTML="";

data.forEach(x=>{
let profit=(x.paid-(x.cost+x.charge));

let div=document.createElement("div");
div.className="item "+x.status;

div.innerHTML=`
<b>👤 ${x.name}</b><br>
📞 ${x.phone}<br>
🔢 ${x.serial}<br>
📅 ${x.date||""}<br>
💰 ربح: ${profit}<br>
📦 ${x.delivered=="yes"?"تم التسليم":"لم يُسلّم"}
`;

list.appendChild(div);
});
};
});
}

/* auto fill search */
function autoFill(){
let key=search.value.toLowerCase();

getDB(db=>{
let tx=db.transaction("orders","readonly");
let st=tx.objectStore("orders");

st.getAll().onsuccess=e=>{
let found=e.target.result.find(x=>
(x.serial||"").includes(key)||
(x.name||"").includes(key)||
(x.phone||"").includes(key)
);

if(found){
name.value=found.name;
phone.value=found.phone;
device.value=found.device;
serial.value=found.serial;
fault.value=found.fault;
date.value=found.date;
cost.value=found.cost;
charge.value=found.charge;
paid.value=found.paid;
status.value=found.status;
delivered.value=found.delivered;
calc();
}
};
});
}

/* CAMERA */
function startCam(){
scanner.style.display="block";

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>{
stream=s;
video.srcObject=s;
});
}

function stopCam(){
if(stream) stream.getTracks().forEach(t=>t.stop());
scanner.style.display="none";
}

render();
</script>

</body>
</html>
