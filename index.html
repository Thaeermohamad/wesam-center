<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز وسام للإلكترونيات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-title { text-align: center; color: #2c3e50; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .app-subtitle { text-align: center; color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 13px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        .btn { background: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .row { display: flex; gap: 8px; }
        .row .form-group { flex: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid #bdc3c7; }
        .stat-box.waiting { border-bottom-color: #e67e22; }
        .stat-box.fixing { border-bottom-color: #3498db; }
        .stat-box.done { border-bottom-color: #27ae60; }
        .stat-num { font-size: 18px; font-weight: bold; color: #2c3e50; display: block; }
        .stat-label { font-size: 10px; color: #7f8c8d; }
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-row input { flex: 1; }
        .search-row button { width: 80px; background: #2980b9; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .filter-buttons { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .filter-btn { background: #e0e0e0; border: none; padding: 6px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #2c3e50; color: white; }
        .order-item { background: #fff; padding: 12px; border-radius: 8px; border-right: 5px solid #bdc3c7; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-waiting { border-right-color: #e67e22; }
        .status-fixing { border-right-color: #3498db; }
        .status-done { border-right-color: #27ae60; }
        .status-archived { border-right-color: #7f8c8d; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .order-details p { font-size: 13px; margin: 3px 0; color: #555; }
        .action-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
        .empty-message { text-align: center; color: #95a5a6; padding: 25px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; display: none; font-weight: bold; font-size: 14px; }
        .records-count { text-align: center; color: #7f8c8d; font-size: 12px; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">مركز وسام للإلكترونيات</div>
    <div class="app-subtitle">نظام إدارة الصيانة</div>

    <div id="notification" class="notification"></div>

    <!-- نموذج الإضافة -->
    <div class="card">
        <form id="maintenanceForm" autocomplete="off">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>الرقم التسلسلي:</label>
                <input type="text" id="serialNumber" required placeholder="أدخل رقم السيريال">
            </div>
            <div class="row">
                <div class="form-group"><label>اسم الزبون:</label><input type="text" id="customerName" required placeholder="اسم الزبون"></div>
                <div class="form-group"><label>رقم الهاتف:</label><input type="tel" id="customerPhone" required placeholder="رقم الهاتف"></div>
            </div>
            <div class="form-group"><label>نوع الجهاز:</label><input type="text" id="deviceType" required placeholder="مثال: شاشة سامسونج"></div>
            <div class="form-group"><label>وصف العطل:</label><textarea id="deviceFault" rows="2" placeholder="تشخيص العطل..."></textarea></div>
            <div class="row">
                <div class="form-group"><label>تاريخ الاستلام:</label><input type="date" id="receiveDate" required></div>
                <div class="form-group"><label>التكلفة:</label><input type="number" id="cost" placeholder="0.00" step="0.01"></div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>الحالة:</label>
                    <select id="statusSelect">
                        <option value="waiting">🟠 قيد الانتظار</option>
                        <option value="fixing">🔵 في الصيانة</option>
                        <option value="done">🟢 جاهز للتسليم</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>استلام الزبون:</label>
                    <select id="customerReceived">
                        <option value="false">❌ لا</option>
                        <option value="true">✅ نعم</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">➕ تسجيل الجهاز</button>
            <button type="button" id="cancelEditBtn" class="btn" style="display:none; background:#95a5a6;" onclick="cancelEdit()">إلغاء التعديل</button>
        </form>
    </div>

    <!-- إحصائيات -->
    <div class="stats-grid">
        <div class="stat-box waiting"><span class="stat-num" id="countWaiting">0</span><span class="stat-label">قيد الانتظار</span></div>
        <div class="stat-box fixing"><span class="stat-num" id="countFixing">0</span><span class="stat-label">في الصيانة</span></div>
        <div class="stat-box done"><span class="stat-num" id="countDone">0</span><span class="stat-label">جاهز للتسليم</span></div>
    </div>

    <!-- بحث مع زر -->
    <div class="search-row">
        <input type="text" id="searchBox" placeholder="🔍 اكتب اسم، رقم، سيريال...">
        <button onclick="doSearch()">🔍 بحث</button>
    </div>

    <!-- فلترة -->
    <div class="filter-buttons">
        <button class="filter-btn active" onclick="changeFilter('all', this)">الكل</button>
        <button class="filter-btn" onclick="changeFilter('waiting', this)">انتظار</button>
        <button class="filter-btn" onclick="changeFilter('fixing', this)">صيانة</button>
        <button class="filter-btn" onclick="changeFilter('done', this)">جاهز</button>
        <button class="filter-btn" onclick="changeFilter('archived', this)">أرشيف</button>
    </div>

    <div class="records-count">عدد السجلات: <strong id="recordsCount">0</strong></div>
    <div id="ordersList"></div>
</div>

<script>
    // ==================== إشعار ====================
    function notify(msg, type) {
        type = type || 'success';
        var n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
        n.style.display = 'block';
        clearTimeout(n._t);
        n._t = setTimeout(function() { n.style.display = 'none'; }, 2000);
    }

    // ==================== قاعدة البيانات ====================
    var db;
    var allOrders = [];
    var currentFilter = 'all';

    var request = indexedDB.open("WesamSimpleV2", 1);
    request.onupgradeneeded = function(e) {
        if (!e.target.result.objectStoreNames.contains("orders")) {
            e.target.result.createObjectStore("orders", { keyPath: "id", autoIncrement: true });
        }
    };
    request.onsuccess = function(e) { 
        db = e.target.result; 
        console.log("✅ DB جاهزة");
        loadOrders(); 
    };
    request.onerror = function() { 
        console.log("❌ خطأ DB");
        notify('خطأ في قاعدة البيانات', 'error'); 
    };

    function loadOrders() {
        if (!db) { console.log("❌ DB غير معرفة"); return; }
        var tx = db.transaction("orders", "readonly");
        var req = tx.objectStore("orders").getAll();
        req.onsuccess = function(e) {
            allOrders = e.target.result || [];
            console.log("✅ تم تحميل " + allOrders.length + " سجل");
            showAll();
        };
        req.onerror = function() { console.log("❌ خطأ تحميل"); };
    }

    // ==================== حفظ / تعديل ====================
    document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        console.log("📝 جاري الحفظ...");
        
        var serial = document.getElementById('serialNumber').value.trim();
        var name = document.getElementById('customerName').value.trim();
        var phone = document.getElementById('customerPhone').value.trim();
        var device = document.getElementById('deviceType').value.trim();
        
        if (!serial || !name || !phone || !device) { 
            notify('املأ جميع الحقول المطلوبة', 'error'); 
            return; 
        }

        var editId = document.getElementById('editId').value;
        var order = {
            serialNumber: serial,
            customerName: name,
            customerPhone: phone,
            deviceType: device,
            deviceFault: document.getElementById('deviceFault').value.trim(),
            receiveDate: document.getElementById('receiveDate').value,
            cost: parseFloat(document.getElementById('cost').value) || 0,
            status: document.getElementById('statusSelect').value,
            customerReceived: document.getElementById('customerReceived').value === 'true',
            createdAt: new Date().toISOString()
        };

        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        
        if (editId) { 
            order.id = parseInt(editId); 
            store.put(order); 
            console.log("✏️ تعديل سجل #" + editId);
        } else { 
            store.add(order); 
            console.log("➕ سجل جديد");
        }
        
        tx.oncomplete = function() { 
            console.log("✅ تم الحفظ");
            resetForm(); 
            loadOrders(); 
            notify(editId ? 'تم التعديل ✓' : 'تم التسجيل ✓'); 
        };
        tx.onerror = function() { 
            console.log("❌ خطأ حفظ");
            notify('خطأ في الحفظ', 'error'); 
        };
    });

    function resetForm() {
        document.getElementById('maintenanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('submitBtn').textContent = '➕ تسجيل الجهاز';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('receiveDate').value = new Date().toISOString().substring(0, 10);
    }

    function cancelEdit() { resetForm(); }

    // ==================== عمليات ====================
    function updateStatus(id, status) {
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (o) { 
                o.status = status; 
                if (status === 'archived') o.archivedAt = new Date().toISOString(); 
                store.put(o); 
                tx.oncomplete = function() { loadOrders(); notify('تم ✓'); }; 
            }
        };
    }

    function toggleReceived(id) {
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (o) { 
                o.customerReceived = !o.customerReceived; 
                store.put(o); 
                tx.oncomplete = function() { loadOrders(); notify(o.customerReceived ? 'تم استلام الزبون ✓' : 'لم يستلم بعد'); }; 
            }
        };
    }

    function deleteOrder(id) {
        if (!confirm('متأكد من حذف هذا الجهاز؟')) return;
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        tx.objectStore("orders").delete(id);
        tx.oncomplete = function() { loadOrders(); notify('تم الحذف ✓'); };
    }

    function editOrder(id) {
        if (!db) return;
        var tx = db.transaction("orders", "readonly");
        var req = tx.objectStore("orders").get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (!o) return;
            document.getElementById('editId').value = o.id;
            document.getElementById('serialNumber').value = o.serialNumber;
            document.getElementById('customerName').value = o.customerName;
            document.getElementById('customerPhone').value = o.customerPhone;
            document.getElementById('deviceType').value = o.deviceType;
            document.getElementById('deviceFault').value = o.deviceFault || '';
            document.getElementById('receiveDate').value = o.receiveDate;
            document.getElementById('cost').value = o.cost || 0;
            document.getElementById('statusSelect').value = o.status;
            document.getElementById('customerReceived').value = o.customerReceived ? 'true' : 'false';
            document.getElementById('submitBtn').textContent = '💾 حفظ التعديلات';
            document.getElementById('cancelEditBtn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    }

    // ==================== عرض ====================
    function doSearch() {
        console.log("🔍 جاري البحث...");
        showAll();
    }

    function showAll() {
        var search = document.getElementById('searchBox').value.toLowerCase().trim();
        console.log("🔍 كلمة البحث: '" + search + "'");
        console.log("🎯 الفلتر: " + currentFilter);
        console.log("📋 كل السجلات: " + allOrders.length);
        
        var filtered = allOrders.filter(function(o) {
            // فلترة الحالة
            if (currentFilter !== 'all' && o.status !== currentFilter) return false;
            
            // فلترة البحث
            if (search) {
                var s = search;
                var found = false;
                if (o.serialNumber && o.serialNumber.toLowerCase().indexOf(s) !== -1) found = true;
                if (o.customerName && o.customerName.toLowerCase().indexOf(s) !== -1) found = true;
                if (o.customerPhone && o.customerPhone.indexOf(s) !== -1) found = true;
                if (o.deviceType && o.deviceType.toLowerCase().indexOf(s) !== -1) found = true;
                if (!found) return false;
            }
            
            return true;
        });
        
        console.log("✅ نتائج البحث: " + filtered.length);
        
        filtered.sort(function(a, b) { return b.id - a.id; });
        document.getElementById('recordsCount').textContent = filtered.length;

        var container = document.getElementById('ordersList');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-message">🚫 لا توجد سجلات</div>';
        } else {
            var html = '';
            filtered.forEach(function(o) {
                var sc = 'status-' + o.status;
                var st = o.status === 'waiting' ? '🟠 انتظار' : o.status === 'fixing' ? '🔵 صيانة' : o.status === 'done' ? '🟢 جاهز' : '⚫ أرشيف';
                var arch = o.status === 'archived';
                var received = o.customerReceived ? '✅ استلم' : '❌ لم يستلم';
                var actions = '';
                
                if (!arch) {
                    actions = '<select onchange="updateStatus(' + o.id + ', this.value)" style="padding:4px;font-size:11px;border-radius:4px;border:1px solid #ccc;"><option value="">تغيير الحالة</option><option value="waiting">🟠 انتظار</option><option value="fixing">🔵 صيانة</option><option value="done">🟢 جاهز</option></select>' +
                        '<button class="btn-sm" style="background:#27ae60;" onclick="updateStatus(' + o.id + ', \'archived\')">📤 تسليم</button>' +
                        '<button class="btn-sm" style="background:#3498db;" onclick="toggleReceived(' + o.id + ')">📋 ' + (o.customerReceived ? 'ألغي الاستلام' : 'استلم') + '</button>' +
                        '<button class="btn-sm" style="background:#f39c12;" onclick="editOrder(' + o.id + ')">✏️ تعديل</button>' +
                        '<button class="btn-sm" style="background:#e74c3c;" onclick="deleteOrder(' + o.id + ')">🗑️ حذف</button>';
                } else {
                    actions = '<button class="btn-sm" style="background:#27ae60;" onclick="updateStatus(' + o.id + ', \'done\')">🔄 استعادة للنشط</button>' +
                        '<button class="btn-sm" style="background:#e74c3c;" onclick="deleteOrder(' + o.id + ')">🗑️ حذف</button>';
                }
                
                html += '<div class="order-item ' + sc + '">' +
                    '<div class="order-header"><span>#' + o.id + ' - ' + o.deviceType + '</span><span>' + st + '</span></div>' +
                    '<div class="order-details">' +
                    '<p><strong>السيريال:</strong> ' + o.serialNumber + '</p>' +
                    '<p><strong>الزبون:</strong> ' + o.customerName + ' | 📞 ' + o.customerPhone + '</p>' +
                    '<p><strong>العطل:</strong> ' + (o.deviceFault || 'غير محدد') + '</p>' +
                    '<p><strong>التكلفة:</strong> ' + (o.cost || 0).toFixed(2) + ' ل.س | <strong>استلام:</strong> ' + received + ' | 📅 ' + o.receiveDate + '</p>' +
                    '</div><div class="action-bar">' + actions + '</div></div>';
            });
            container.innerHTML = html;
        }

        // تحديث الإحصائيات
        var active = allOrders.filter(function(o) { return o.status !== 'archived'; });
        document.getElementById('countWaiting').textContent = active.filter(function(o) { return o.status === 'waiting'; }).length;
        document.getElementById('countFixing').textContent = active.filter(function(o) { return o.status === 'fixing'; }).length;
        document.getElementById('countDone').textContent = active.filter(function(o) { return o.status === 'done'; }).length;
    }

    function changeFilter(filter, btn) {
        currentFilter = filter;
        var buttons = document.querySelectorAll('.filter-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].className = 'filter-btn';
        }
        btn.className = 'filter-btn active';
        console.log("🎯 تغيير الفلتر إلى: " + filter);
        showAll();
    }

    // ==================== بدء ====================
    window.onload = function() {
        document.getElementById('receiveDate').value = new Date().toISOString().substring(0, 10);
        console.log("🚀 تطبيق مركز وسام جاهز");
        console.log("💡 للبحث: اكتب كلمة ثم اضغط زر 🔍 بحث");
    };
</script>

</body>
</html>
