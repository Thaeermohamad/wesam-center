<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مركز وسام للإلكترونيات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-title { text-align: center; color: #2c3e50; font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .app-subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        h3 { text-align: center; color: #34495e; margin: 15px 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 13px; color: #34495e; }
        .barcode-container { display: flex; gap: 8px; }
        .scan-btn { background: #34495e; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: #3498db; }
        .btn { background: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #scanner-wrapper { display: none; background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #reader { width: 100%; max-width: 350px; margin: 0 auto; border: 2px solid #3498db; border-radius: 8px; overflow: hidden; }
        .close-scan-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .view-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #bdc3c7; color: #333; }
        .tab-btn.active { background: #2c3e50; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid #bdc3c7; }
        .stat-box.waiting { border-bottom-color: #e67e22; }
        .stat-box.fixing { border-bottom-color: #3498db; }
        .stat-box.done { border-bottom-color: #27ae60; }
        .stat-num { font-size: 18px; font-weight: bold; color: #2c3e50; display: block; }
        .stat-label { font-size: 11px; color: #7f8c8d; }
        .control-panel { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .filter-buttons { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #2c3e50; color: white; }
        .order-item { background: #fff; padding: 15px; border-radius: 8px; border-right: 5px solid #bdc3c7; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-waiting { border-right-color: #e67e22; }
        .status-fixing { border-right-color: #3498db; }
        .status-done { border-right-color: #27ae60; }
        .status-archived { border-right-color: #7f8c8d; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; }
        .order-details p { font-size: 14px; margin-bottom: 4px; color: #555; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; flex-wrap: wrap; gap: 5px; }
        .archive-btn { background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .update-select { width: auto; padding: 3px 5px; font-size: 12px; }
        .empty-message { text-align: center; color: #95a5a6; padding: 30px; font-size: 15px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 12px 25px; border-radius: 25px; z-index: 1000; display: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .total-box { background: #e8f5e9; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; color: #2e7d32; font-size: 16px; margin-top: 5px; }
        .profit-box { background: #fff3e0; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; color: #e65100; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">

    <div class="app-title">مركز وسام للإلكترونيات</div>
    <div class="app-subtitle">نظام إدارة وصيانة الأجهزة الذكي</div>

    <div id="notification" class="notification"></div>

    <div id="scanner-wrapper">
        <h4 style="margin-bottom: 10px;">وجه الكاميرا نحو الباركود</h4>
        <div id="reader"></div>
        <button type="button" class="close-scan-btn" onclick="stopScanner()">إلغاء المسح</button>
    </div>

    <div class="card">
        <form id="maintenanceForm" autocomplete="off">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>الرقم التسلسلي / الباركود:</label>
                <div class="barcode-container">
                    <input type="text" id="serialNumber" required placeholder="أدخل رقم السيريال">
                    <button type="button" class="scan-btn" onclick="startScanner()">📷 مسح</button>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>اسم الزبون:</label><input type="text" id="customerName" required placeholder="اسم الزبون"></div>
                <div class="form-group"><label>رقم الهاتف:</label><input type="tel" id="customerPhone" required placeholder="رقم الهاتف"></div>
            </div>
            <div class="form-group"><label>نوع الجهاز:</label><input type="text" id="deviceType" required placeholder="مثال: شاشة سامسونج، هاتف آيفون"></div>
            <div class="form-group"><label>وصف العطل:</label><textarea id="deviceFault" rows="2" placeholder="اكتب تشخيص العطل هنا..."></textarea></div>
            <div class="row">
                <div class="form-group"><label>تاريخ الاستلام:</label><input type="date" id="receiveDate" required></div>
                <div class="form-group">
                    <label>الحالة:</label>
                    <select id="statusSelect">
                        <option value="waiting">🟠 قيد الانتظار</option>
                        <option value="fixing">🔵 في الصيانة</option>
                        <option value="done">🟢 جاهز للتسليم</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>تكلفة القطع:</label><input type="number" id="partsCost" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group"><label>أجر الصيانة:</label><input type="number" id="repairCharge" value="0" step="0.01" oninput="calcTotals()"></div>
            </div>
            <div class="total-box" id="totalCostBox">التكلفة الإجمالية: 0.00 ل.س</div>
            <div class="row">
                <div class="form-group"><label>المبلغ المدفوع:</label><input type="number" id="paidAmount" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group">
                    <label>حالة الدفع:</label>
                    <select id="paymentStatus">
                        <option value="false">❌ غير مدفوع</option>
                        <option value="true">✅ تم الدفع</option>
                    </select>
                </div>
            </div>
            <div class="profit-box" id="profitBox">الربح: 0.00 ل.س</div>
            <button type="submit" class="btn" id="submitBtn">تسجيل الجهاز الجديد</button>
            <button type="button" class="btn" id="cancelEditBtn" style="display:none; background:#95a5a6; margin-top:8px;" onclick="cancelEdit()">إلغاء التعديل</button>
        </form>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" id="activeTab" onclick="switchView('active')">الأجهزة النشطة</button>
        <button class="tab-btn" id="archiveTab" onclick="switchView('archived')">الأرشيف</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box waiting"><span class="stat-num" id="countWaiting">0</span><span class="stat-label">قيد الانتظار</span></div>
        <div class="stat-box fixing"><span class="stat-num" id="countFixing">0</span><span class="stat-label">في الصيانة</span></div>
        <div class="stat-box done"><span class="stat-num" id="countDone">0</span><span class="stat-label">جاهز للتسليم</span></div>
    </div>

    <div class="control-panel">
        <div class="barcode-container">
            <input type="text" id="searchBox" placeholder="🔍 ابحث بالباركود، الاسم، الهاتف..." oninput="filterOrders()">
            <button type="button" class="scan-btn" style="background:#2980b9;" onclick="startScannerSearch()">📷 بحث</button>
        </div>
        <div class="filter-buttons" id="filterContainer">
            <button class="filter-btn active" onclick="changeFilter('all', this)">الكل</button>
            <button class="filter-btn" onclick="changeFilter('waiting', this)">قيد الانتظار</button>
            <button class="filter-btn" onclick="changeFilter('fixing', this)">في الصيانة</button>
            <button class="filter-btn" onclick="changeFilter('done', this)">جاهز للتسليم</button>
        </div>
    </div>

    <h3 id="listTitle">قائمة الأجهزة داخل الورشة</h3>
    <div id="ordersList"></div>

</div>

<script>
    // ==================== الحسابات ====================
    function calcTotals() {
        var parts = parseFloat(document.getElementById('partsCost').value) || 0;
        var repair = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        var total = parts + repair;
        var profit = paid - total;
        document.getElementById('totalCostBox').textContent = 'التكلفة الإجمالية: ' + total.toFixed(2) + ' ل.س';
        var profitBox = document.getElementById('profitBox');
        profitBox.textContent = 'الربح: ' + profit.toFixed(2) + ' ل.س';
        profitBox.style.color = profit >= 0 ? '#2e7d32' : '#c62828';
    }

    // ==================== إشعارات ====================
    function notify(msg, type) {
        type = type || 'success';
        var n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
        n.style.display = 'block';
        setTimeout(function() { n.style.display = 'none'; }, 2000);
    }

    // ==================== قاعدة البيانات ====================
    var db;
    var allOrders = [];
    var mainView = 'active';
    var currentFilter = 'all';
    var scannerStream = null;
    var scanInterval = null;
    var scanTarget = 'form';

    var request = indexedDB.open("WesamCenterDB", 1);
    request.onupgradeneeded = function(e) {
        var database = e.target.result;
        if (!database.objectStoreNames.contains("orders")) {
            database.createObjectStore("orders", { keyPath: "id", autoIncrement: true });
        }
    };
    request.onsuccess = function(e) {
        db = e.target.result;
        console.log("✅ DB ready");
        loadOrders();
    };
    request.onerror = function(e) {
        console.error("DB error:", e.target.error);
    };

    function loadOrders() {
        if (!db) return;
        var tx = db.transaction("orders", "readonly");
        var store = tx.objectStore("orders");
        var req = store.getAll();
        req.onsuccess = function() {
            allOrders = req.result || [];
            console.log("✅ Loaded " + allOrders.length + " orders");
            filterOrders();
        };
        req.onerror = function(e) {
            console.error("Load error:", e.target.error);
        };
    }

    // ==================== إضافة/تعديل ====================
    document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var serialNumber = document.getElementById('serialNumber').value.trim();
        var customerName = document.getElementById('customerName').value.trim();
        var customerPhone = document.getElementById('customerPhone').value.trim();
        var deviceType = document.getElementById('deviceType').value.trim();
        
        if (!serialNumber || !customerName || !customerPhone || !deviceType) {
            notify('يرجى ملء جميع الحقول المطلوبة', 'error');
            return;
        }

        var partsCost = parseFloat(document.getElementById('partsCost').value) || 0;
        var repairCharge = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paidAmount = parseFloat(document.getElementById('paidAmount').value) || 0;
        var totalCost = partsCost + repairCharge;
        var profit = paidAmount - totalCost;
        var editId = document.getElementById('editId').value;

        var order = {
            serialNumber: serialNumber,
            customerName: customerName,
            customerPhone: customerPhone,
            deviceType: deviceType,
            deviceFault: document.getElementById('deviceFault').value.trim(),
            receiveDate: document.getElementById('receiveDate').value,
            status: document.getElementById('statusSelect').value,
            partsCost: partsCost,
            repairCharge: repairCharge,
            totalCost: totalCost,
            paidAmount: paidAmount,
            profit: profit,
            paymentStatus: document.getElementById('paymentStatus').value === 'true',
            createdAt: new Date().toISOString()
        };

        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");

        if (editId) {
            order.id = parseInt(editId);
            store.put(order);
        } else {
            store.add(order);
        }

        tx.oncomplete = function() {
            resetForm();
            loadOrders();
            notify(editId ? 'تم تعديل الجهاز ✓' : 'تم تسجيل الجهاز ✓');
        };
        tx.onerror = function() {
            notify('خطأ في الحفظ', 'error');
        };
    });

    function resetForm() {
        document.getElementById('maintenanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('submitBtn').textContent = 'تسجيل الجهاز الجديد';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('receiveDate').value = new Date().toISOString().substring(0, 10);
        document.getElementById('statusSelect').value = 'waiting';
        document.getElementById('totalCostBox').textContent = 'التكلفة الإجمالية: 0.00 ل.س';
        document.getElementById('profitBox').textContent = 'الربح: 0.00 ل.س';
    }

    function cancelEdit() { resetForm(); }

    // ==================== تحديث/حذف ====================
    function updateStatus(id, newStatus) {
        if (!newStatus) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var order = req.result;
            if (order) {
                order.status = newStatus;
                if (newStatus === 'archived') order.archivedAt = new Date().toISOString();
                store.put(order);
                tx.oncomplete = function() { loadOrders(); notify('تم تحديث الحالة ✓'); };
            }
        };
    }

    function togglePayment(id) {
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var order = req.result;
            if (order) {
                order.paymentStatus = !order.paymentStatus;
                order.profit = (order.paymentStatus ? order.paidAmount : 0) - order.totalCost;
                store.put(order);
                tx.oncomplete = function() { loadOrders(); notify(order.paymentStatus ? 'تم تأكيد الدفع ✓' : 'تم إلغاء الدفع'); };
            }
        };
    }

    function deleteOrder(id) {
        if (!confirm('متأكد من حذف هذا الجهاز؟')) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        store.delete(id);
        tx.oncomplete = function() { loadOrders(); notify('تم الحذف ✓'); };
    }

    function editOrder(id) {
        var tx = db.transaction("orders", "readonly");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var order = req.result;
            if (order) {
                document.getElementById('editId').value = order.id;
                document.getElementById('serialNumber').value = order.serialNumber;
                document.getElementById('customerName').value = order.customerName;
                document.getElementById('customerPhone').value = order.customerPhone;
                document.getElementById('deviceType').value = order.deviceType;
                document.getElementById('deviceFault').value = order.deviceFault || '';
                document.getElementById('receiveDate').value = order.receiveDate;
                document.getElementById('statusSelect').value = order.status;
                document.getElementById('partsCost').value = order.partsCost || 0;
                document.getElementById('repairCharge').value = order.repairCharge || 0;
                document.getElementById('paidAmount').value = order.paidAmount || 0;
                document.getElementById('paymentStatus').value = order.paymentStatus ? 'true' : 'false';
                calcTotals();
                document.getElementById('submitBtn').textContent = 'حفظ التعديلات';
                document.getElementById('cancelEditBtn').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
    }

    // ==================== عرض القائمة ====================
    function filterOrders() {
        var search = document.getElementById('searchBox').value.toLowerCase().trim();
        var filtered = allOrders.filter(function(o) {
            if (mainView === 'active' && o.status === 'archived') return false;
            if (mainView === 'archived' && o.status !== 'archived') return false;
            if (mainView === 'active' && currentFilter !== 'all' && o.status !== currentFilter) return false;
            if (search) {
                var s = search;
                if (![o.serialNumber, o.customerName, o.customerPhone, o.deviceType].some(function(v) { return v && v.toLowerCase().indexOf(s) !== -1; })) return false;
            }
            return true;
        });
        filtered.sort(function(a, b) { return b.id - a.id; });
        displayOrders(filtered);
