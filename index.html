<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مركز وسام للإلكترونيات - نظام الصيانة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; }
        .app-title { text-align: center; color: #2c3e50; font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .app-subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 13px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #2980b9; }
        .btn { background: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: #1f6390; }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-orange { background: #f39c12; }
        .btn-purple { background: #8e44ad; }
        .barcode-container { display: flex; gap: 8px; }
        .scan-btn { background: #34495e; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-size: 18px; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
        .scan-btn:hover { background: #2c3e50; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid #bdc3c7; }
        .stat-box.waiting { border-bottom-color: #e67e22; }
        .stat-box.fixing { border-bottom-color: #3498db; }
        .stat-box.done { border-bottom-color: #27ae60; }
        .stat-num { font-size: 24px; font-weight: bold; color: #2c3e50; display: block; }
        .stat-label { font-size: 11px; color: #7f8c8d; }
        .search-box { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .filter-buttons { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; flex-wrap: wrap; }
        .filter-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .filter-btn.active { background: #2c3e50; color: white; }
        .order-item { background: #fff; padding: 12px; border-radius: 8px; border-right: 5px solid #bdc3c7; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-waiting { border-right-color: #e67e22; }
        .status-fixing { border-right-color: #3498db; }
        .status-done { border-right-color: #27ae60; }
        .status-archived { border-right-color: #7f8c8d; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; font-size: 14px; }
        .order-details p { font-size: 13px; margin-bottom: 3px; color: #555; }
        .action-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
        .empty-message { text-align: center; color: #95a5a6; padding: 30px; font-size: 16px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 25px; border-radius: 25px; z-index: 1000; display: none; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .row { display: flex; gap: 8px; }
        .row .form-group { flex: 1; }
        .total-box { background: #e8f5e9; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; color: #2e7d32; font-size: 15px; margin-top: 5px; }
        .profit-box { background: #fff3e0; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 15px; margin-top: 5px; }
        .records-count { text-align: center; color: #7f8c8d; font-size: 12px; margin: 10px 0; }
        #scanner-wrapper { display: none; background: #000; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        #scanner-video { width: 100%; max-width: 350px; border-radius: 8px; }
        .close-scan-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 6px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .customer-received-box { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-top: 5px; display: flex; align-items: center; gap: 10px; }
        .customer-received-box label { margin-bottom: 0; margin-left: 10px; }
        select#customerReceived { width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">📱 مركز وسام للإلكترونيات</div>
    <div class="app-subtitle">نظام إدارة الصيانة والمتابعة</div>

    <div id="notification" class="notification"></div>

    <!-- ماسح الباركود -->
    <div id="scanner-wrapper">
        <video id="scanner-video" autoplay playsinline></video>
        <br>
        <button class="close-scan-btn" onclick="stopScanner()">❌ إلغاء المسح</button>
        <p style="color:white; font-size:12px; margin-top:5px;">وجه الكاميرا نحو الباركود</p>
    </div>

    <!-- نموذج الإدخال -->
    <div class="card">
        <form id="maintenanceForm" autocomplete="off">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>الباركود / الرقم التسلسلي:</label>
                <div class="barcode-container">
                    <input type="text" id="serialNumber" required placeholder="أدخل الرقم أو امسح الباركود">
                    <button type="button" class="scan-btn" onclick="startScanner()">📷</button>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>اسم الزبون:</label><input type="text" id="customerName" required></div>
                <div class="form-group"><label>رقم الهاتف:</label><input type="tel" id="customerPhone" required></div>
            </div>
            <div class="form-group"><label>نوع الجهاز:</label><input type="text" id="deviceType" required></div>
            <div class="form-group"><label>وصف العطل:</label><textarea id="deviceFault" rows="2"></textarea></div>
            <div class="row">
                <div class="form-group"><label>تاريخ الاستلام:</label><input type="date" id="receiveDate" required></div>
                <div class="form-group">
                    <label>الحالة:</label>
                    <select id="statusSelect">
                        <option value="waiting">🟠 انتظار</option>
                        <option value="fixing">🔵 صيانة</option>
                        <option value="done">🟢 جاهز</option>
                    </select>
                </div>
            </div>
            <!-- ✅ حقل استلام الزبون المضاف -->
            <div class="customer-received-box">
                <label>استلام الزبون:</label>
                <select id="customerReceived">
                    <option value="no">❌ لا</option>
                    <option value="yes">✅ نعم</option>
                </select>
            </div>
            <div class="row">
                <div class="form-group"><label>تكلفة القطع:</label><input type="number" id="partsCost" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group"><label>أجر الصيانة:</label><input type="number" id="repairCharge" value="0" step="0.01" oninput="calcTotals()"></div>
            </div>
            <div class="total-box" id="totalCostBox">التكلفة: 0.00 ل.س</div>
            <div class="row">
                <div class="form-group"><label>المدفوع:</label><input type="number" id="paidAmount" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group">
                    <label>الدفع:</label>
                    <select id="paymentStatus">
                        <option value="false">❌ غير مدفوع</option>
                        <option value="true">✅ مدفوع</option>
                    </select>
                </div>
            </div>
            <div class="profit-box" id="profitBox">الربح: 0.00 ل.س</div>
            <button type="submit" class="btn" id="submitBtn">➕ تسجيل الجهاز</button>
            <button type="button" id="cancelEditBtn" class="btn" style="display:none; background:#95a5a6;" onclick="cancelEdit()">↩️ إلغاء التعديل</button>
        </form>
    </div>

    <!-- الإحصائيات -->
    <div class="stats-grid">
        <div class="stat-box waiting"><span class="stat-num" id="countWaiting">0</span><span class="stat-label">🟠 انتظار</span></div>
        <div class="stat-box fixing"><span class="stat-num" id="countFixing">0</span><span class="stat-label">🔵 صيانة</span></div>
        <div class="stat-box done"><span class="stat-num" id="countDone">0</span><span class="stat-label">🟢 جاهز</span></div>
    </div>

    <!-- البحث والفلترة -->
    <input type="text" id="searchBox" class="search-box" placeholder="🔍 بحث بالباركود، الاسم، الهاتف..." oninput="filterOrders()">

    <div class="filter-buttons">
        <button class="filter-btn active" onclick="changeFilter('all', this)">📋 الكل</button>
        <button class="filter-btn" onclick="changeFilter('waiting', this)">🟠 انتظار</button>
        <button class="filter-btn" onclick="changeFilter('fixing', this)">🔵 صيانة</button>
        <button class="filter-btn" onclick="changeFilter('done', this)">🟢 جاهز</button>
        <button class="filter-btn" onclick="changeFilter('archived', this)">📦 أرشيف</button>
    </div>

    <div class="records-count">عدد السجلات المعروضة: <strong id="recordsCount">0</strong></div>
    <div id="ordersList"></div>
</div>

<script>
    // ==================== المتغيرات العامة ====================
    var db;
    var allOrders = [];
    var currentFilter = 'all';
    var scannerStream = null;
    var scanInterval = null;
    var barcodeDetector = null;

    // التحقق من دعم BarcodeDetector API
    if ('BarcodeDetector' in window) {
        barcodeDetector = new BarcodeDetector({ formats: ['qr_code', 'ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e'] });
    }

    // ==================== الحسابات ====================
    function calcTotals() {
        var parts = parseFloat(document.getElementById('partsCost').value) || 0;
        var repair = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        var total = parts + repair;
        var profit = paid - total;
        document.getElementById('totalCostBox').textContent = 'التكلفة: ' + total.toFixed(2) + ' ل.س';
        var pb = document.getElementById('profitBox');
        pb.textContent = 'الربح: ' + profit.toFixed(2) + ' ل.س';
        pb.style.color = profit >= 0 ? '#2e7d32' : '#c62828';
    }

    // ==================== الإشعارات ====================
    function notify(msg, type) {
        type = type || 'success';
        var n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
        n.style.display = 'block';
        clearTimeout(n._t);
        n._t = setTimeout(function() { n.style.display = 'none'; }, 2500);
    }

    // ==================== الكاميرا والماسح ====================
    async function startScanner() {
        document.getElementById('scanner-wrapper').style.display = 'block';
        var video = document.getElementById('scanner-video');

        try {
            scannerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = scannerStream;
            video.play();
            notify('الكاميرا جاهزة، وجهها نحو الباركود', 'success');
            scanBarcode();
        } catch (err) {
            console.error("خطأ في الكاميرا:", err);
            notify('تعذر الوصول إلى الكاميرا. تأكد من السماح بالوصول.', 'error');
            stopScanner();
        }
    }

    function scanBarcode() {
        var video = document.getElementById('scanner-video');
        if (!barcodeDetector) {
            // إذا كانت API غير مدعومة، نعتمد على طريقة بدائية للقراءة اليدوية
            notify('متصفحك لا يدعم قارئ الباركود التلقائي. استخدم الإدخال اليدوي.', 'error');
            stopScanner();
            return;
        }

        async function detect() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scannerStream) {
                try {
                    var barcodes = await barcodeDetector.detect(video);
                    if (barcodes.length > 0) {
                        var value = barcodes[0].rawValue;
                        document.getElementById('serialNumber').value = value;
                        notify('تم مسح الباركود: ' + value, 'success');
                        stopScanner();
                        return;
                    }
                } catch (e) {
                    console.error("خطأ في الكشف:", e);
                }
            }
            if (scannerStream) {
                requestAnimationFrame(detect);
            }
        }
        detect();
    }

    function stopScanner() {
        if (scannerStream) {
            scannerStream.getTracks().forEach(function(track) { track.stop(); });
            scannerStream = null;
        }
        document.getElementById('scanner-wrapper').style.display = 'none';
        document.getElementById('scanner-video').srcObject = null;
    }

    // ==================== قاعدة البيانات IndexedDB ====================
    var dbRequest = indexedDB.open("WesamCenterDB", 2);
    dbRequest.onupgradeneeded = function(e) {
        var database = e.target.result;
        if (!database.objectStoreNames.contains("orders")) {
            var store = database.createObjectStore("orders", { keyPath: "id", autoIncrement: true });
            store.createIndex("status", "status", { unique: false });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        console.log("✅ قاعدة البيانات جاهزة");
        loadOrders();
    };
    dbRequest.onerror = function(e) {
        console.error("❌ خطأ في قاعدة البيانات:", e.target.error);
        notify('خطأ فادح في قاعدة البيانات!', 'error');
    };

    function loadOrders() {
        if (!db) return;
        try {
            var tx = db.transaction("orders", "readonly");
            var store = tx.objectStore("orders");
            var req = store.getAll();
            req.onsuccess = function() {
                allOrders = req.result || [];
                filterOrders();
            };
        } catch (err) {
            console.error("خطأ في تحميل الطلبات:", err);
        }
    }

    // ==================== إضافة وتعديل الطلبات ====================
    document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var serial = document.getElementById('serialNumber').value.trim();
        var name = document.getElementById('customerName').value.trim();
        var phone = document.getElementById('customerPhone').value.trim();
        var device = document.getElementById('deviceType').value.trim();

        if (!serial || !name || !phone || !device) {
            notify('يرجى ملء جميع الحقول المطلوبة', 'error');
            return;
        }

        var partsCost = parseFloat(document.getElementById('partsCost').value) || 0;
        var repairCharge = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paidAmount = parseFloat(document.getElementById('paidAmount').value) || 0;
        var totalCost = partsCost + repairCharge;
        var editId = document.getElementById('editId').value;

        var order = {
            serialNumber: serial,
            customerName: name,
            customerPhone: phone,
            deviceType: device,
            deviceFault: document.getElementById('deviceFault').value.trim(),
            receiveDate: document.getElementById('receiveDate').value,
            status: document.getElementById('statusSelect').value,
            customerReceived: document.getElementById('customerReceived').value, // ✅ جديد
            partsCost: partsCost,
            repairCharge: repairCharge,
            totalCost: totalCost,
            paidAmount: paidAmount,
            profit: paidAmount - totalCost,
            paymentStatus: document.getElementById('paymentStatus').value === 'true',
            updatedAt: new Date().toISOString()
        };

        if (!editId) {
            order.createdAt = new Date().toISOString();
        }

        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");

        if (editId) {
            order.id = parseInt(editId);
            store.put(order);
        } else {
            store.add(order);
        }

        tx.oncomplete = function() {
            resetForm();
            loadOrders();
            notify(editId ? 'تم تعديل الجهاز بنجاح ✓' : 'تم تسجيل الجهاز بنجاح ✓');
        };
        tx.onerror = function(e) {
            console.error("خطأ في الحفظ:", e.target.error);
            notify('فشل في حفظ البيانات', 'error');
        };
    });

    function resetForm() {
        document.getElementById('maintenanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('submitBtn').textContent = '➕ تسجيل الجهاز';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('receiveDate').value = new Date().toISOString().substring(0, 10);
        document.getElementById('customerReceived').value = 'no'; // ✅ إعادة تعيين الحقل الجديد
        document.getElementById('totalCostBox').textContent = 'التكلفة: 0.00 ل.س';
        document.getElementById('profitBox').textContent = 'الربح: 0.00 ل.س';
    }

    function cancelEdit() { resetForm(); }

    function editOrder(id) {
        var order = allOrders.find(function(o) { return o.id === id; });
        if (!order) return;
        document.getElementById('editId').value = order.id;
        document.getElementById('serialNumber').value = order.serialNumber;
        document.getElementById('customerName').value = order.customerName;
        document.getElementById('customerPhone').value = order.customerPhone;
        document.getElementById('deviceType').value = order.deviceType;
        document.getElementById('deviceFault').value = order.deviceFault || '';
        document.getElementById('receiveDate').value = order.receiveDate;
        document.getElementById('statusSelect').value = order.status;
        document.getElementById('customerReceived').value = order.customerReceived || 'no'; // ✅
        document.getElementById('partsCost').value = order.partsCost || 0;
        document.getElementById('repairCharge').value = order.repairCharge || 0;
        document.getElementById('paidAmount').value = order.paidAmount || 0;
        document.getElementById('paymentStatus').value = order.paymentStatus ? '
