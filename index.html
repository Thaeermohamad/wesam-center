<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز الصيانة</title>

<style>
body{font-family:Segoe UI;background:#f4f7f9;margin:0;padding:10px}
.container{max-width:700px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
input,select,button,textarea{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
button{cursor:pointer}
.row{display:flex;gap:5px}
.row > *{flex:1}
.item{background:#fff;padding:10px;margin:10px 0;border-radius:8px;border-right:5px solid #ccc}
.waiting{border-color:orange}
.fixing{border-color:blue}
.done{border-color:green}
.archived{border-color:gray}
.small{font-size:12px;color:#555}
.btn{background:#2c3e50;color:#fff}
.btn-danger{background:#e74c3c}
.btn-green{background:#27ae60}
.stats{display:flex;gap:5px}
.stats div{flex:1;background:#fff;padding:10px;border-radius:8px;text-align:center}
video{width:100%;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h3>📱 نظام الصيانة</h3>

<div class="card">
<input id="serial" placeholder="الباركود">
<button onclick="startScan()">📷 مسح باركود</button>

<input id="name" placeholder="اسم الزبون">
<input id="phone" placeholder="الهاتف">
<input id="device" placeholder="نوع الجهاز">
<textarea id="fault" placeholder="العطل"></textarea>

<div class="row">
<input id="cost" placeholder="تكلفة" type="number" oninput="calc()">
<input id="charge" placeholder="أجر" type="number" oninput="calc()">
</div>

<div class="row">
<input id="paid" placeholder="مدفوع" type="number" oninput="calc()">
<select id="status">
<option value="waiting">انتظار</option>
<option value="fixing">صيانة</option>
<option value="done">جاهز</option>
</select>
</div>

<div id="result">💰 التكلفة: 0 | الربح: 0</div>

<button class="btn" onclick="save()">حفظ</button>
<button class="btn" onclick="cancelEdit()" style="display:none" id="cancelBtn">إلغاء</button>
</div>

<div class="card">
<input id="search" placeholder="بحث..." oninput="render()">
</div>

<div class="stats">
<div>انتظار: <span id="w">0</span></div>
<div>صيانة: <span id="f">0</span></div>
<div>جاهز: <span id="d">0</span></div>
</div>

<div id="list"></div>

<!-- كاميرا -->
<div class="card" id="scanner" style="display:none">
<video id="video" autoplay></video>
<button onclick="stopScan()" class="btn-danger">إغلاق</button>
</div>

</div>

<script>
let db;
let editId = null;
let stream = null;

function initDB(){
let req = indexedDB.open("db",1);
req.onupgradeneeded=e=>{
let d=e.target.result;
d.createObjectStore("orders",{keyPath:"id",autoIncrement:true});
};
req.onsuccess=e=>{
db=e.target.result;
render();
};
}

function calc(){
let c=+cost.value||0;
let ch=+charge.value||0;
let p=+paid.value||0;
result.innerText="💰 التكلفة: "+(c+ch)+" | الربح: "+(p-(c+ch));
}

function save(){
let obj={
serial:serial.value,
name:name.value,
phone:phone.value,
device:device.value,
fault:fault.value,
cost:+cost.value||0,
charge:+charge.value||0,
paid:+paid.value||0,
status:status.value
};

let tx=db.transaction("orders","readwrite");
let st=tx.objectStore("orders");

if(editId){
obj.id=editId;
st.put(obj);
}else{
st.add(obj);
}

tx.oncomplete=()=>{
reset();
render();
};
}

function reset(){
editId=null;
serial.value=name.value=phone.value=device.value=fault.value="";
cost.value=charge.value=paid.value="";
calc();
}

function render(){
let tx=db.transaction("orders","readonly");
let st=tx.objectStore("orders");
let req=st.getAll();

req.onsuccess=()=>{
let data=req.result;

let s=search.value.toLowerCase();
if(s){
data=data.filter(x=>
(x.serial||"").includes(s)||
(x.name||"").includes(s)||
(x.phone||"").includes(s)
);
}

list.innerHTML="";

let w=0,f=0,d=0;

data.forEach(x=>{
if(x.status=="waiting")w++;
if(x.status=="fixing")f++;
if(x.status=="done")d++;

let div=document.createElement("div");
div.className="item "+x.status;

div.innerHTML=`
<b>${x.name}</b><br>
<span class="small">${x.device}</span><br>
📞 ${x.phone}<br>
🔢 ${x.serial}<br>
💰 ربح: ${x.paid-(x.cost+x.charge)}<br>

<button onclick="edit(${x.id})">تعديل</button>
<button onclick="del(${x.id})" class="btn-danger">حذف</button>
<button onclick="change(${x.id})">تغيير الحالة</button>
`;

list.appendChild(div);
});

w.innerText=w;
f.innerText=f;
d.innerText=d;
};
}

function edit(id){
let tx=db.transaction("orders","readonly");
let st=tx.objectStore("orders");
let req=st.get(id);

req.onsuccess=()=>{
let x=req.result;
editId=x.id;

serial.value=x.serial;
name.value=x.name;
phone.value=x.phone;
device.value=x.device;
fault.value=x.fault;
cost.value=x.cost;
charge.value=x.charge;
paid.value=x.paid;
status.value=x.status;

calc();
};
}

function del(id){
let tx=db.transaction("orders","readwrite");
tx.objectStore("orders").delete(id);
tx.oncomplete=render;
}

function change(id){
let tx=db.transaction("orders","readwrite");
let st=tx.objectStore("orders");

st.get(id).onsuccess=e=>{
let x=e.target.result;
let order=["waiting","fixing","done"];
let i=order.indexOf(x.status);
x.status=order[(i+1)%3];
st.put(x);
render();
};
}

/* ====== الكاميرا ====== */

function startScan(){
document.getElementById("scanner").style.display="block";

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>{
stream=s;
video.srcObject=s;

scanLoop();
});
}

function scanLoop(){
if("BarcodeDetector" in window){
let detector=new BarcodeDetector({formats:["qr_code","ean_13","code_128"]});

setInterval(async ()=>{
let barcodes=await detector.detect(video);
if(barcodes.length>0){
serial.value=barcodes[0].rawValue;
stopScan();
}
},1000);
}
}

function stopScan(){
if(stream){
stream.getTracks().forEach(t=>t.stop());
}
document.getElementById("scanner").style.display="none";
}

function cancelEdit(){
reset();
}

initDB();
</script>

</body>
    </html>
