<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز وسام للإلكترونيات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-title { text-align: center; color: #2c3e50; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .app-subtitle { text-align: center; color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 13px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        .btn { background: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-sm { padding: 6px 10px; font-size: 11px; width: auto; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-orange { background: #f39c12; }
        .btn-purple { background: #8e44ad; }
        .barcode-container { display: flex; gap: 8px; }
        .scan-btn { background: #34495e; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid #bdc3c7; }
        .stat-box.waiting { border-bottom-color: #e67e22; }
        .stat-box.fixing { border-bottom-color: #3498db; }
        .stat-box.done { border-bottom-color: #27ae60; }
        .stat-num { font-size: 20px; font-weight: bold; color: #2c3e50; display: block; }
        .stat-label { font-size: 10px; color: #7f8c8d; }
        .search-box { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .filter-buttons { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .filter-btn { background: #e0e0e0; border: none; padding: 6px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #2c3e50; color: white; }
        .order-item { background: #fff; padding: 12px; border-radius: 8px; border-right: 5px solid #bdc3c7; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-waiting { border-right-color: #e67e22; }
        .status-fixing { border-right-color: #3498db; }
        .status-done { border-right-color: #27ae60; }
        .status-archived { border-right-color: #7f8c8d; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; font-size: 14px; }
        .order-details p { font-size: 13px; margin-bottom: 3px; color: #555; }
        .action-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
        .empty-message { text-align: center; color: #95a5a6; padding: 25px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; display: none; font-weight: bold; font-size: 14px; }
        .row { display: flex; gap: 8px; }
        .row .form-group { flex: 1; }
        .total-box { background: #e8f5e9; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; color: #2e7d32; font-size: 14px; margin-top: 5px; }
        .profit-box { background: #fff3e0; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .records-count { text-align: center; color: #7f8c8d; font-size: 12px; margin: 8px 0; }
        #scanner-wrapper { display: none; background: #000; padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        #scanner-video { width: 100%; max-width: 300px; }
        .close-scan-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; margin-top: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">مركز وسام للإلكترونيات</div>
    <div class="app-subtitle">نظام إدارة الصيانة</div>

    <div id="notification" class="notification"></div>

    <div id="scanner-wrapper">
        <video id="scanner-video" autoplay playsinline></video>
        <br>
        <button class="close-scan-btn" onclick="stopScanner()">إلغاء</button>
    </div>

    <div class="card">
        <form id="maintenanceForm" autocomplete="off">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>الباركود / الرقم التسلسلي:</label>
                <div class="barcode-container">
                    <input type="text" id="serialNumber" required placeholder="أدخل الرقم">
                    <button type="button" class="scan-btn" onclick="startScanner()">📷</button>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>اسم الزبون:</label><input type="text" id="customerName" required></div>
                <div class="form-group"><label>رقم الهاتف:</label><input type="tel" id="customerPhone" required></div>
            </div>
            <div class="form-group"><label>نوع الجهاز:</label><input type="text" id="deviceType" required></div>
            <div class="form-group"><label>وصف العطل:</label><textarea id="deviceFault" rows="2"></textarea></div>
            <div class="row">
                <div class="form-group"><label>تاريخ الاستلام:</label><input type="date" id="receiveDate" required></div>
                <div class="form-group">
                    <label>الحالة:</label>
                    <select id="statusSelect">
                        <option value="waiting">🟠 انتظار</option>
                        <option value="fixing">🔵 صيانة</option>
                        <option value="done">🟢 جاهز</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>تكلفة القطع:</label><input type="number" id="partsCost" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group"><label>أجر الصيانة:</label><input type="number" id="repairCharge" value="0" step="0.01" oninput="calcTotals()"></div>
            </div>
            <div class="total-box" id="totalCostBox">التكلفة: 0.00 ل.س</div>
            <div class="row">
                <div class="form-group"><label>المدفوع:</label><input type="number" id="paidAmount" value="0" step="0.01" oninput="calcTotals()"></div>
                <div class="form-group">
                    <label>الدفع:</label>
                    <select id="paymentStatus">
                        <option value="false">❌ غير مدفوع</option>
                        <option value="true">✅ مدفوع</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>استلام الزبون:</label>
                <select id="customerReceived">
                    <option value="false">❌ لا</option>
                    <option value="true">✅ نعم</option>
                </select>
            </div>
            <div class="profit-box" id="profitBox">الربح: 0.00 ل.س</div>
            <button type="submit" class="btn" id="submitBtn">➕ تسجيل الجهاز</button>
            <button type="button" id="cancelEditBtn" class="btn" style="display:none; background:#95a5a6;" onclick="cancelEdit()">إلغاء التعديل</button>
        </form>
    </div>

    <div class="stats-grid">
        <div class="stat-box waiting"><span class="stat-num" id="countWaiting">0</span><span class="stat-label">🟠 انتظار</span></div>
        <div class="stat-box fixing"><span class="stat-num" id="countFixing">0</span><span class="stat-label">🔵 صيانة</span></div>
        <div class="stat-box done"><span class="stat-num" id="countDone">0</span><span class="stat-label">🟢 جاهز</span></div>
    </div>

    <input type="text" id="searchBox" class="search-box" placeholder="🔍 بحث بالباركود، الاسم، الهاتف..." oninput="filterOrders()">

    <div class="filter-buttons">
        <button class="filter-btn active" onclick="changeFilter('all', this)">الكل</button>
        <button class="filter-btn" onclick="changeFilter('waiting', this)">انتظار</button>
        <button class="filter-btn" onclick="changeFilter('fixing', this)">صيانة</button>
        <button class="filter-btn" onclick="changeFilter('done', this)">جاهز</button>
        <button class="filter-btn" onclick="changeFilter('archived', this)">أرشيف</button>
    </div>

    <div class="records-count">عدد السجلات: <strong id="recordsCount">0</strong></div>
    <div id="ordersList"></div>
</div>

<script>
    function calcTotals() {
        var parts = parseFloat(document.getElementById('partsCost').value) || 0;
        var repair = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        var total = parts + repair;
        var profit = paid - total;
        document.getElementById('totalCostBox').textContent = 'التكلفة: ' + total.toFixed(2) + ' ل.س';
        var pb = document.getElementById('profitBox');
        pb.textContent = 'الربح: ' + profit.toFixed(2) + ' ل.س';
        pb.style.color = profit >= 0 ? '#2e7d32' : '#c62828';
    }

    function notify(msg, type) {
        type = type || 'success';
        var n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
        n.style.display = 'block';
        clearTimeout(n._t);
        n._t = setTimeout(function() { n.style.display = 'none'; }, 2000);
    }

    var db;
    var allOrders = [];
    var currentFilter = 'all';
    var scannerStream = null;
    var scanInterval = null;

    var dbRequest = indexedDB.open("WesamCenterV3", 1);
    dbRequest.onupgradeneeded = function(e) {
        var database = e.target.result;
        if (!database.objectStoreNames.contains("orders")) {
            database.createObjectStore("orders", { keyPath: "id", autoIncrement: true });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        console.log("✅ DB ready");
        loadOrders();
    };
    dbRequest.onerror = function(e) {
        console.error("❌ DB error:", e.target.error);
        notify('خطأ في قاعدة البيانات', 'error');
    };

    function loadOrders() {
        if (!db) return;
        var tx = db.transaction("orders", "readonly");
        var store = tx.objectStore("orders");
        var req = store.getAll();
        req.onsuccess = function() {
            allOrders = req.result || [];
            console.log("✅ Loaded " + allOrders.length + " orders");
            filterOrders();
        };
        req.onerror = function(e) {
            console.error("❌ Load error:", e.target.error);
        };
    }

    document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        console.log("📝 Saving...");

        var serial = document.getElementById('serialNumber').value.trim();
        var name = document.getElementById('customerName').value.trim();
        var phone = document.getElementById('customerPhone').value.trim();
        var device = document.getElementById('deviceType').value.trim();

        if (!serial || !name || !phone || !device) {
            notify('يرجى ملء جميع الحقول المطلوبة', 'error');
            return;
        }

        var partsCost = parseFloat(document.getElementById('partsCost').value) || 0;
        var repairCharge = parseFloat(document.getElementById('repairCharge').value) || 0;
        var paidAmount = parseFloat(document.getElementById('paidAmount').value) || 0;
        var totalCost = partsCost + repairCharge;
        var editId = document.getElementById('editId').value;

        var order = {
            serialNumber: serial,
            customerName: name,
            customerPhone: phone,
            deviceType: device,
            deviceFault: document.getElementById('deviceFault').value.trim(),
            receiveDate: document.getElementById('receiveDate').value,
            status: document.getElementById('statusSelect').value,
            partsCost: partsCost,
            repairCharge: repairCharge,
            totalCost: totalCost,
            paidAmount: paidAmount,
            profit: paidAmount - totalCost,
            paymentStatus: document.getElementById('paymentStatus').value === 'true',
            customerReceived: document.getElementById('customerReceived').value === 'true',
            createdAt: new Date().toISOString()
        };

        if (!db) { notify('DB not ready', 'error'); return; }

        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");

        if (editId) { order.id = parseInt(editId); store.put(order); }
        else { store.add(order); }

        tx.oncomplete = function() {
            console.log("✅ Saved");
            resetForm();
            loadOrders();
            notify(editId ? 'تم التعديل ✓' : 'تم التسجيل ✓');
        };
        tx.onerror = function(e) {
            console.error("❌ Save error:", e.target.error);
            notify('خطأ في الحفظ', 'error');
        };
    });

    function resetForm() {
        document.getElementById('maintenanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('submitBtn').textContent = '➕ تسجيل الجهاز';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('receiveDate').value = new Date().toISOString().substring(0, 10);
        document.getElementById('totalCostBox').textContent = 'التكلفة: 0.00 ل.س';
        document.getElementById('profitBox').textContent = 'الربح: 0.00 ل.س';
        document.getElementById('profitBox').style.color = '#e65100';
    }

    function cancelEdit() { resetForm(); }

    function updateStatus(id, newStatus) {
        if (!newStatus || !db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (o) {
                o.status = newStatus;
                if (newStatus === 'archived') o.archivedAt = new Date().toISOString();
                store.put(o);
                tx.oncomplete = function() { loadOrders(); notify('تم ✓'); };
            }
        };
    }

    function togglePayment(id) {
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (o) {
                o.paymentStatus = !o.paymentStatus;
                o.profit = (o.paymentStatus ? o.paidAmount : 0) - o.totalCost;
                store.put(o);
                tx.oncomplete = function() { loadOrders(); notify(o.paymentStatus ? 'تم تأكيد الدفع ✓' : 'تم إلغاء الدفع'); };
            }
        };
    }

    function toggleReceived(id) {
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (o) {
                o.customerReceived = !o.customerReceived;
                store.put(o);
                tx.oncomplete = function() { loadOrders(); notify(o.customerReceived ? 'تم استلام الزبون ✓' : 'لم يستلم بعد'); };
            }
        };
    }

    function deleteOrder(id) {
        if (!confirm('متأكد من الحذف؟')) return;
        if (!db) return;
        var tx = db.transaction("orders", "readwrite");
        var store = tx.objectStore("orders");
        store.delete(id);
        tx.oncomplete = function() { loadOrders(); notify('تم الحذف ✓'); };
    }

    function editOrder(id) {
        if (!db) return;
        var tx = db.transaction("orders", "readonly");
        var store = tx.objectStore("orders");
        var req = store.get(id);
        req.onsuccess = function() {
            var o = req.result;
            if (!o) return;
            document.getElementById('editId').value = o.id;
            document.getElementById('serialNumber').value = o.serialNumber;
            document.getElementById('customerName').value = o.customerName;
            document.getElementById('customerPhone').value = o.customerPhone;
            document.getElementById('deviceType').value = o.deviceType;
            document.getElementById('deviceFault').value = o.deviceFault || '';
            document.getElementById('receiveDate').value = o.receiveDate;
            document.getElementById('statusSelect').value = o.status;
            document.getElementById('partsCost').value = o.partsCost || 0;
            document.getElementById('repairCharge').value = o.repairCharge || 0;
            document.getElementById('paidAmount').value = o.paidAmount || 0;
            document.getElementById('paymentStatus').value = o.paymentStatus ? 'true' : 'false';
            document.getElementById('customerReceived').value = o.customerReceived ? 'true' : 'false';
            calcTotals();
            document.getElementById('submitBtn').textContent = '💾 حفظ التعديلات';
            document.getElementById('cancelEditBtn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    }

    function filterOrders() {
        var search = document.getElementById('searchBox').value.toLowerCase().trim();
        var filtered = allOrders.filter(function(o) {
            if (currentFilter !== 'all' && o.status !== currentFilter) return false;
            if (search) {
                var s = search;
                var found = false;
                if (o.serialNumber && o.serialNumber.toLowerCase().indexOf(s) !== -1) found = true;
                if (o.customerName && o.customerName.toLowerCase().indexOf(s) !== -1) found = true;
                if (o.customerPhone && o.customerPhone.toLowerCase().indexOf(s) !== -1) found = true;
                if (o.deviceType && o.deviceType.toLowerCase().indexOf(s) !== -1) found = true;
                if (!found) return false;
            }
            return true;
        });
        filtered.sort(function(a, b) { return b.id - a.id; });
        document.getElementById('recordsCount').textContent = filtered.length;

        var container = document.getElementById('ordersList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-message">🚫 لا توجد أجهزة</div>';
        } else {
            var html = '';
            filtered.forEach(function(o) {
                var sc = 'status-' + o.status;
                var st = o.status === 'waiting' ? '🟠 انتظار' : o.status === 'fixing' ? '🔵 صيانة' : o.status === 'done' ? '🟢 جاهز' : '⚫ أرشيف';
                var arch = o.status === 'archived';
                var pc = (o.profit || 0) >= 0 ? '#2e7
