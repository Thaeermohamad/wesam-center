<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز وسام للإلكترونيات</title>
    <style>
        :root { --waiting: #e67e22; --fixing: #3498db; --done: #27ae60; --archived: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; width: 100%; font-weight: bold; }
        .flex { display: flex; gap: 5px; }
        #video { width: 100%; display: none; background: black; border-radius: 10px; }
        .order-card { border-right: 5px solid #ccc; padding: 10px; background: white; margin-bottom: 10px; border-radius: 5px; }
        .status-waiting { border-right-color: var(--waiting); }
        .status-fixing { border-right-color: var(--fixing); }
        .status-done { border-right-color: var(--done); }
    </style>
</head>
<body>

<div class="container">
    <h2>مركز وسام للإلكترونيات</h2>
    
    <div class="card">
        <video id="video" playsinline></video>
        <div class="flex">
            <input type="text" id="serial" placeholder="الباركود / السيريال">
            <button class="btn" style="background:#2980b9" onclick="startScanner()">📷</button>
        </div>
        <input type="text" id="custName" placeholder="اسم الزبون">
        <input type="text" id="phone" placeholder="رقم الهاتف">
        <input type="text" id="device" placeholder="نوع الجهاز">
        <textarea id="fault" placeholder="وصف العطل"></textarea>
        <div class="flex">
            <input type="number" id="parts" placeholder="تكلفة القطع" oninput="calc()">
            <input type="number" id="labor" placeholder="أجر الصيانة" oninput="calc()">
        </div>
        <div id="totals" style="padding: 10px; background: #eee; border-radius: 5px; text-align: center;">
            التكلفة: 0 | الربح: 0
        </div>
        <select id="status"><option value="waiting">انتظار</option><option value="fixing">صيانة</option><option value="done">جاهز</option></select>
        <button class="btn" style="background:#27ae60; margin-top: 10px;" onclick="saveOrder()">حفظ السجل</button>
    </div>

    <input type="text" id="search" placeholder="🔍 بحث..." onkeyup="render()">
    
    <div id="list"></div>
</div>

<script>
    let db;
    const request = indexedDB.open("WesamDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("orders", {keyPath: "id", autoIncrement: true});
    request.onsuccess = e => { db = e.target.result; render(); };

    function calc() {
        let p = +document.getElementById('parts').value || 0;
        let l = +document.getElementById('labor').value || 0;
        document.getElementById('totals').innerText = `التكلفة الإجمالية: ${p+l} | الربح المتوقع: ${l}`;
    }

    async function startScanner() {
        const video = document.getElementById('video');
        video.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
        video.srcObject = stream;
        video.play();
        
        const barcodeDetector = new BarcodeDetector();
        const scan = async () => {
            try {
                const barcodes = await barcodeDetector.detect(video);
                if (barcodes.length > 0) {
                    document.getElementById('serial').value = barcodes[0].rawValue;
                    stream.getTracks().forEach(t => t.stop());
                    video.style.display = 'none';
                } else { requestAnimationFrame(scan); }
            } catch(e) { requestAnimationFrame(scan); }
        };
        scan();
    }

    function saveOrder() {
        const order = {
            serial: document.getElementById('serial').value,
            name: document.getElementById('custName').value,
            status: document.getElementById('status').value,
            date: new Date().toLocaleDateString('ar-EG')
        };
        db.transaction("orders", "readwrite").objectStore("orders").add(order).onsuccess = () => {
            alert("تم الحفظ");
            render();
        };
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        db.transaction("orders").objectStore("orders").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const div = document.createElement('div');
                div.className = `order-card status-${cursor.value.status}`;
                div.innerHTML = `<strong>${cursor.value.name}</strong> - ${cursor.value.serial} <br> الحالة: ${cursor.value.status}`;
                list.appendChild(div);
                cursor.continue();
            }
        };
    }
</script>
</body>
</html>
